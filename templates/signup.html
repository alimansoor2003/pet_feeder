{% extends "base.html" %}
{% block title %}Sign Up — PawSense{% endblock %}
{% block content %}

<div style="max-width: 420px; margin: 4rem auto; padding: 0 1rem;">
  <div class="card">
    <h1 style="text-align:center;">Create Your Account</h1>
    <p style="text-align:center; color: var(--ink-soft); margin-bottom: 1.75rem;">Set up your personal feeding dashboard.</p>

    <form method="post">
      <div class="form-group">
        <label for="name">Your Name</label>
        <input type="text" id="name" name="name" placeholder="Alex" required>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="At least 6 characters" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
    </form>

    <p style="text-align:center; margin-top: 1.5rem; color: var(--ink-soft); font-size: 0.9rem;">
      Already have an account? <a href="{{ url_for('login') }}" style="color: var(--sage-dark); font-weight: 600;">Log in</a>
    </p>
  </div>
</div>

{% endblock %}
