{% extends "base.html" %}
{% block title %}Log In — PawSense{% endblock %}
{% block content %}

<div style="max-width: 420px; margin: 4rem auto; padding: 0 1rem;">
  <div class="card">
    <h1 style="text-align:center;">Welcome Back</h1>
    <p style="text-align:center; color: var(--ink-soft); margin-bottom: 1.75rem;">Log in to your feeding dashboard.</p>

    <form method="post">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Your password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%;">Log In</button>
    </form>

    <p style="text-align:center; margin-top: 1.5rem; color: var(--ink-soft); font-size: 0.9rem;">
      Don't have an account? <a href="{{ url_for('signup') }}" style="color: var(--sage-dark); font-weight: 600;">Sign up</a>
    </p>
  </div>
</div>

{% endblock %}
